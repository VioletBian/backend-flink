server:
  port: 8004
  tomcat:
    basedir: .
    accesslog:
      enabled: true
      directory: logs
      prefix: access
      suffix: .log
      pattern: '%t %a "%r" %s %b %D'

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  data:
    mongodb:
      uri: mongodb://localhost:27017/pipeline_db

logging:
  level:
    com.dataprocessor.flink: INFO
    org.apache.flink: WARN
    org.apache.flink.streaming.api.operators.collect.CollectResultFetcher: ERROR

backend:
  flink:
    mongo-collection-name: pipelines
    python-command: python3
    python-activation-script:
    python-runner-path: backend/scripts/reference_runner_cli.py
    python-working-directory: .
    cors:
      allowed-origin-patterns:
        - http://localhost:*
        - http://127.0.0.1:*
        - https://localhost:*
        - https://127.0.0.1:*
